<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CULTURA | Sign In</title>
  <meta name="description"
    content="Sign into your CULTURA account to manage your probiotic subscriptions and wellness shipments.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 24px 40px;

    }

    @media (max-width: 768px) {
      .auth-container {
        padding: 10px 16px 40px;
      }
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: var(--card-shadow);
      text-align: center;
    }

    body.dark-theme .auth-card {
      background: rgba(30, 30, 30, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .auth-logo {
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    /* Hover underline for auth links */
    .auth-link {
      text-decoration: none;
      transition: text-decoration 0.2s ease, color 0.2s ease;
    }

    .auth-link:hover {
      text-decoration: underline;
    }

    /* Social login buttons */
    .social-auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .social-auth-divider::before,
    .social-auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .social-auth-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    .social-auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px 20px;
      border-radius: 40px;
      border: 1px solid var(--border);
      background-color: var(--surface);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 480;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .social-auth-btn:hover {
      border-color: var(--primary);
      background-color: var(--bg-secondary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(62, 107, 72, 0.12);
    }

    .social-auth-btn svg {
      flex-shrink: 0;
    }

    body.dark-theme .social-auth-btn {
      background-color: var(--surface);
      border-color: rgba(255, 255, 255, 0.1);
    }

    body.dark-theme .social-auth-btn:hover {
      border-color: var(--primary);
      background-color: rgba(62, 107, 72, 0.08);
    }
  </style>
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>

<body>

  <!-- Floating Theme and RTL Controls Wrapper -->
  <div class="theme-rtl-controls">
    <button class="theme-toggle" aria-label="Toggle Theme"></button>
    <button class="rtl-toggle" aria-label="Toggle Layout Direction">RTL</button>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">
        <div class="logo-icon">C</div>
        <span class="logo-text">CULTURA</span>
      </a>

      <h2 style="font-size: 28px; margin-bottom: 12px; color: var(--text-primary);">Welcome Back</h2>
      <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 32px;">Manage your active subscriptions
        and delivery calendars.</p>

      <form onsubmit="event.preventDefault(); alert('Login successful!'); window.location.href='index.html';">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="Enter Email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" class="form-control" placeholder="Enter Password" required>
            <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" style="width: 20px; height: 20px;">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
          </div>
        </div>

        <div
          style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 14px;">
          <label
            style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary); font-weight: 420;">
            <input type="checkbox" style="accent-color: var(--primary); width: 16px; height: 16px;"> Remember Me
          </label>
          <a href="#" class="auth-link" style="color: var(--primary); font-weight: 480;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">Sign In</button>
      </form>

      <div class="social-auth-divider">or continue with</div>

      <div class="social-auth-buttons">
        <!-- Google -->
        <button class="social-auth-btn" onclick="alert('Google Sign In coming soon!')">
          <svg width="18" height="18" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M47.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h13.2c-.6 3-2.3 5.5-4.9 7.2v6h7.9c4.6-4.3 7.3-10.6 7.3-17.5z"
              fill="#4285F4" />
            <path
              d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.9-6c-2.1 1.4-4.8 2.3-8 2.3-6.1 0-11.3-4.1-13.2-9.7H2.5v6.1C6.5 42.8 14.7 48 24 48z"
              fill="#34A853" />
            <path
              d="M10.8 28.8A14.6 14.6 0 0 1 10 24c0-1.7.3-3.3.8-4.8v-6.1H2.5A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.9l8.3-6.1z"
              fill="#FBBC05" />
            <path
              d="M24 9.5c3.4 0 6.5 1.2 8.9 3.5l6.6-6.6C35.9 2.4 30.5 0 24 0 14.7 0 6.5 5.2 2.5 13.1l8.3 6.1C12.7 13.6 17.9 9.5 24 9.5z"
              fill="#EA4335" />
          </svg>
          Continue with Google
        </button>
        <!-- Facebook -->
        <button class="social-auth-btn" onclick="alert('Facebook Sign In coming soon!')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M24 12.073C24 5.404 18.627 0 12 0S0 5.404 0 12.073c0 6.029 4.388 11.026 10.125 11.927v-8.434H7.078v-3.493h3.047V9.414c0-3.025 1.791-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.974h-1.513c-1.491 0-1.956.93-1.956 1.883v2.265h3.328l-.532 3.493h-2.796v8.434C19.612 23.099 24 18.102 24 12.073z" />
          </svg>
          Continue with Facebook
        </button>
        <!-- Apple -->
        <button class="social-auth-btn" onclick="alert('Apple Sign In coming soon!')">
          <svg width="18" height="18" viewBox="0 0 814 1000" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.8-155.5-127.4C46 790.8 0 663.7 0 541.8 0 347.3 126.1 243.1 250.5 243.1c66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z" />
          </svg>
          Continue with Apple
        </button>
      </div>

      <p style="font-size: 14px; color: var(--text-secondary); margin-top: 20px;">
        New to CULTURA? <a href="signup.html" class="auth-link" style="color: var(--primary); font-weight: 480;">Sign
          Up</a>
      </p>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>

</html>
