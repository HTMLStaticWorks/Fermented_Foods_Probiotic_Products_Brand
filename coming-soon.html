<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Coming Soon</title>
  <meta name="description" content="Feature coming soon">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="theme-rtl-controls">
    <button class="theme-toggle" aria-label="Toggle Theme"></button>
    <button class="rtl-toggle" aria-label="Toggle Layout Direction">RTL</button>
    <a href="signup.html" class="signup-btn">Sign Up</a>
  </div>

  <style>
    .coming-hero {
      min-height: 80vh;
      display: grid;
      place-items: center;
      padding: 80px 24px;
      background: linear-gradient(180deg, var(--bg-primary), var(--bg-secondary));
    }

    .coming-card {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 32px;
      align-items: center;
      padding: 40px;
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border);
    }

    .coming-card h1 { font-size: 40px; margin-bottom: 12px; color: var(--text-primary); }
    .coming-card p { color: var(--text-secondary); margin-bottom: 20px; }

    .notify-form { display:flex; gap:12px; align-items:center; }
    .notify-form .form-control { padding: 12px 14px; border-radius: 12px; }
    .notify-form .btn { padding: 12px 20px; border-radius: 12px; }

    .illustration { width:100%; border-radius:12px; overflow:hidden; background: linear-gradient(135deg,var(--primary),var(--secondary)); height:260px; display:flex; align-items:center; justify-content:center; color:#FFF; font-weight:600; }

    @media (max-width: 880px) {
      .coming-card { grid-template-columns: 1fr; padding: 28px; }
      .illustration { height:200px; }
    }
  </style>

  <section class="coming-hero">
    <div class="coming-card">
      <div>
        <h1>We’re launching something delicious</h1>
        <p>Sign up to be the first to know when we go live — exclusive early access and subscriber perks.</p>

        <form class="notify-form" onsubmit="event.preventDefault(); alert('Thanks — you\'ll be notified!');">
          <input class="form-control" type="email" placeholder="Your email address" required>
          <button class="btn btn-primary" type="submit">Notify Me</button>
        </form>

        <div style="margin-top:18px; display:flex; gap:10px;">
          <a href="index.html" class="btn btn-secondary">Return Home</a>
          <a href="contact.html" class="btn btn-primary">Contact Us</a>
        </div>
      </div>

      <div class="illustration" aria-hidden="true">
        <svg width="180" height="140" viewBox="0 0 180 140" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 8px 24px rgba(0,0,0,0.12));">
          <rect rx="18" width="180" height="140" fill="rgba(255,255,255,0.06)"/>
          <g transform="translate(24,18)">
            <circle cx="40" cy="40" r="34" fill="rgba(255,255,255,0.12)" />
            <rect x="78" y="20" width="60" height="80" rx="12" fill="rgba(255,255,255,0.09)" />
          </g>
        </svg>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
